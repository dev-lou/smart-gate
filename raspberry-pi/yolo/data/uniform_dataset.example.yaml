# Copy this file to uniform_dataset.yaml and update absolute paths.
# YOLO dataset layout should be:
# dataset/
#   images/
#     train/
#     val/
#   labels/
#     train/
#     val/
#
# Each label file is YOLO txt format:
# class_id x_center y_center width height
# Values are normalized to [0, 1].

path: C:/Users/Lou/Desktop/smart-gate-system/raspberry-pi/yolo/dataset
train: images/train
val: images/val

# Keep names lowercase; these are consumed by config.YOLO_UNIFORM_CLASS_MAP
names:
  0: uniform_default
  1: uniform_blue_vest
  2: uniform_red_badge
  3: uniform_green_vest
